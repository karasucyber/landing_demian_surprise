<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>V Festival Sem Kimono — Inscrições</title>
  <meta name="description" content="Escola de Jiu Jitsu Brasileiro Demian Maia.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --accent: #ffb400;
      --bg-dark: #0a0c10;
      --panel-bg: rgba(25, 32, 46, 0.9);
    }

    body {
      background-color: var(--bg-dark);
      color: #e9eef6;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr;
      min-height: 100vh;
      background: url('backgroundmobile.png') center top/cover no-repeat;
      background-attachment: fixed;
    }

    @media (min-width: 992px) {
      .hero {
        grid-template-columns: 1.2fr 1fr;
        background: var(--bg-dark);
      }

      .left-image {
        background: var(--bg-dark) url('IMG_0070.jpg') center  / cover no-repeat;
        position: relative;
        height: 100vh;
        width: 100%;
      }

      .left-image::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to right, transparent 50%, var(--bg-dark));
      }
    }

    .left-image { display: none; }
    
    @media (min-width: 992px) { 
      .left-image { display: block; } 
    }

    .right {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    @media (min-width: 992px) {
      .right { padding: 40px; }
    }

    .panel {
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 30px 20px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.6);
    }

    @media (min-width: 992px) {
      .panel { padding: 40px; }
    }

    .event-info {
      text-align: center;
      margin-bottom: 25px;
    }

    .event-info h1 {
      font-weight: 900;
      font-size: 2rem;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: -1px;
      line-height: 1.1;
      color: #fff;
    }

    @media (min-width: 992px) {
      .event-info h1 { font-size: 2.8rem; }
    }

    .event-info .date {
      color: var(--accent);
      font-size: 1.3rem;
      font-weight: 800;
      margin-top: 5px;
    }

    .lotes {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }

    .lote-card {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 180, 0, 0.15);
      text-align: center;
    }

    .lote-card strong { color: #fff; font-size: 12px; }
    .lote-card .price { font-size: 20px; font-weight: 900; color: #fff; margin: 4px 0; }
    .lote-card small { color: #aab5c6; font-size: 11px; }

    .form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .input, .select {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      padding: 14px;
      color: #fff;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .input:focus, .select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .full { grid-column: 1 / -1; }

    .btn-submit {
      background: linear-gradient(180deg, #ffde73 0%, #ffb400 100%);
      color: #11161f;
      font-weight: 900;
      font-size: 15px;
      border: none;
      padding: 18px;
      border-radius: 999px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 15px;
      box-shadow: 0 10px 25px rgba(255, 180, 0, 0.25);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(255, 180, 0, 0.35);
    }

    .obs {
      font-size: 11px;
      color: #8899aa;
      text-align: center;
      margin-top: 20px;
    }

    .footer-links {
      text-align: center;
      margin-top: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 15px;
    }

    .footer-links a {
      color: #aab5c6;
      font-size: 13px;
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: #fff; }
  </style>
</head>
<body>

  <section class="hero">
    <div class="left-image"></div>

    <div class="right">
      <div class="panel">
        <div class="event-info">
          <h1>V Festival <br><span style="color:var(--accent)">Sem Kimono</span></h1>
          <div class="date">30 DE MAIO</div>
          <p style="font-size: 12px; color: #888; text-transform:uppercase; letter-spacing:1px; margin-top:5px;">Escola Demian Maia</p>
        </div>

        <div class="lotes">
          <div class="lote-card">
            <strong>1º LOTE</strong>
            <div class="price">R$ 140</div>
            <small>até 13/04</small>
          </div>
          <div class="lote-card">
            <strong>2º LOTE</strong>
            <div class="price">R$ 170</div>
            <small>até 18/05</small>
          </div>
        </div>

        <form id="form" class="form">
          <input class="input full" name="Nome" placeholder="Nome completo" required>
          <input class="input" name="Idade" placeholder="Idade" inputmode="numeric" required>
          
          <select class="select" name="Sexo" required>
              <option value="" disabled selected>Sexo</option>
              <option>Masculino</option>
              <option>Feminino</option>
          </select>

          <input class="input" name="email" type="email" placeholder="E-mail" required>
          <input class="input" name="whatsapp" placeholder="WhatsApp" required>
          
          <select class="select" name="Faixa" required>
              <option value="" disabled selected>Faixa (No-Gi)</option>
              <option>Branca</option>
              <option>Azul</option>
              <option>Roxa</option>
              <option>Marrom</option>
              <option>Preta</option>
          </select>

          <input class="input" name="Peso" placeholder="Peso (kg)" inputmode="decimal">

          <select class="select full" name="Equipe" required>
            <option value="" disabled selected>Selecione sua filial</option>
            <option>Matriz</option>
            <option>FALCÕES ARTE & JIU JITSU</option>
            <option>Alpha Team</option>
            <option>Strike Machine</option>
          </select>

          <button class="btn-submit full" type="submit">Confirmar Inscrição</button>
        </form>

        <p class="obs">OBS: Válido somente para alunos e filiados da Escola.</p>
        
        <div class="footer-links">
          <a href="chaves.html">Consultar atletas e chaves</a>
        </div>
      </div>
    </div>
  </section>

</body>
</html>
